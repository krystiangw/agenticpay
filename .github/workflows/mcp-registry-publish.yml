name: Publish to MCP Registry

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      registry:
        description: "Registry URL"
        required: false
        default: "https://registry.modelcontextprotocol.io"

permissions:
  contents: read
  id-token: write # required for github-oidc auth to the registry

jobs:
  publish:
    name: Publish server.json to MCP Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download mcp-publisher binary
        run: |
          set -euo pipefail
          VERSION="v1.7.6"
          curl -fSL \
            "https://github.com/modelcontextprotocol/registry/releases/download/${VERSION}/mcp-publisher_linux_amd64.tar.gz" \
            -o /tmp/mcp-publisher.tar.gz
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp/
          sudo mv /tmp/mcp-publisher /usr/local/bin/mcp-publisher
          chmod +x /usr/local/bin/mcp-publisher
          mcp-publisher --help | head -5

      - name: Validate server.json
        run: mcp-publisher validate

      - name: Login (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish
        run: mcp-publisher publish --file server.json
